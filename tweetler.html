<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Tweetler</title>

<style>

body{
margin:0;
font-family: Georgia, "Book Antiqua", serif;
background:#f6f5f2;
color:#1f1f1f;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fbfbfa;
border-bottom:1px solid #e6e6e6;
z-index:1000;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10px;
}

.site-title{
font-size:34px;
}

.menu{
display:flex;
gap:28px;
}

.menu a{
text-decoration:none;
color:#333;
}

/* SAYFA */

.page{
margin-top:160px;
max-width:1200px;
margin-left:auto;
margin-right:auto;
display:grid;
grid-template-columns:300px 1fr;
gap:40px;
padding:20px;
}

/* SOL KUTU */

.post-list{
background:white;
padding:20px;
border:1px solid #e6e6e6;
}

.post-item{
cursor:pointer;
margin-bottom:15px;
font-size:18px;
}

.post-item:hover{
color:#3f6f52;
}

/* SAĞ ÖZET */

.summary{
background:white;
padding:30px;
border:1px solid #e6e6e6;
min-height:300px;
}

.summary h3{
margin-top:0;
}

.read{
display:inline-block;
margin-top:20px;
border-bottom:1px solid black;
text-decoration:none;
color:black;
}

</style>

</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
<a href="/" style="text-decoration:none;color:inherit;">Nagihan Saka</a>
</div>

<div class="menu">
<a href="/dusunceler.html">Düşünceler</a>
<a href="/calismalar.html">Çalışmalar</a>
<a href="/iletisim.html">İletişim</a>
</div>

</div>
</div>
</div>


<div class="page">

<div class="post-list">

<div class="post-item"
onclick="showPost(
'İlk tweet',
'Kısa bir düşünce notu.',
'/pdf/ilk-tweet.pdf'
)">İlk tweet</div>

<div class="post-item"
onclick="showPost(
'İkinci tweet',
'Başka bir kısa fikir.',
'/pdf/ikinci-tweet.pdf'
)">İkinci tweet</div>

</div>


<div class="summary" id="summaryBox">

<h3>Bir tweet seç</h3>
<p>Soldaki listeden bir başlığa tıklayın.</p>

</div>

</div>


<script>

function showPost(title, summary, link){

document.getElementById("summaryBox").innerHTML = `
<h3>${title}</h3>
<p>${summary}</p>
<a class="read" href="${link}" target="_blank">Devamı (PDF)</a>
`;

}

</script>

</body>
</html>
