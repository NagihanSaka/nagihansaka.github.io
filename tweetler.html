<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Tweetler</title>

<style>

body{
margin:0;
font-family: Georgia, "Book Antiqua", serif;
background:#f6f5f2;
color:#1f1f1f;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fbfbfa;
border-bottom:1px solid #e6e6e6;
z-index:1000;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10px;
}

.site-title{
font-size:34px;
}

.menu{
display:flex;
gap:28px;
}

.menu a{
text-decoration:none;
color:#333;
}

/* SAYFA */

.page{
margin-top:160px;
max-width:1200px;
margin-left:auto;
margin-right:auto;
display:grid;
grid-template-columns:320px 1fr;
gap:40px;
padding:20px;
}

/* SOL PANEL */

.post-list{
background:white;
padding:20px;
border:1px solid #e6e6e6;
height:420px;
overflow-y:auto;
}

/* SCROLLBAR */

.post-list::-webkit-scrollbar{
width:6px;
}

.post-list::-webkit-scrollbar-thumb{
background:#ccc;
}

/* YAZI */

.post-item{
cursor:pointer;
margin-bottom:12px;
font-size:17px;
}

.post-item:hover{
color:#3f6f52;
}

/* ORTA KUTU */

.summary{
background:white;
padding:30px;
border:1px solid #e6e6e6;
min-height:300px;
}

.summary h3{
margin-top:0;
}

/* SIRALAMA */

.sort{
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
<a href="/" style="text-decoration:none;color:inherit;">Nagihan Saka</a>
</div>

<div class="menu">
<a href="/dusunceler.html">Düşünceler</a>
<a href="/calismalar.html">Çalışmalar</a>
<a href="/iletisim.html">İletişim</a>
</div>

</div>
</div>
</div>

<div class="page">

<div>

<div class="sort">

<select onchange="sortPosts(this.value)">

<option value="date">Tarihe göre</option>
<option value="alpha">Alfabetik</option>

</select>

</div>

<div class="post-list" id="postList"></div>

</div>


<div class="summary" id="summaryBox">

<h3>Bir tweet seç</h3>
<p>Soldaki listeden bir başlığa tıklayın.</p>

</div>

</div>


<script>

let posts = [

{
title:"Sistemler insanları üretir",
date:"2026-03-10",
text:"İnsan davranışının önemli kısmı sistemin ürünüdür."
},

{
title:"Kurumlar zamanla körleşir",
date:"2026-03-09",
text:"Başarı uzun sürerse sistem geri bildirimleri kaybolur."
},

{
title:"Stratejik planlar çoğu zaman dekoratif",
date:"2026-03-08",
text:"Çünkü gerçek kaldıraç noktalarına dokunmazlar."
}

];

function renderPosts(){

let list=document.getElementById("postList");

list.innerHTML="";

posts.forEach(p=>{

let div=document.createElement("div");

div.className="post-item";

div.innerText=p.title;

div.onclick=()=>showPost(p);

list.appendChild(div);

});

}

function showPost(post){

document.getElementById("summaryBox").innerHTML=

"<h3>"+post.title+"</h3><p>"+post.text+"</p>";

}

function sortPosts(type){

if(type=="alpha"){

posts.sort((a,b)=>a.title.localeCompare(b.title));

}

if(type=="date"){

posts.sort((a,b)=>new Date(b.date)-new Date(a.date));

}

renderPosts();

}

renderPosts();

</script>

</body>
</html>
