<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Düşünceler</title>

<style>

body{
margin:0;
font-family: Georgia, "Book Antiqua", serif;
background:#f6f5f2;
color:#1f1f1f;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fbfbfa;
border-bottom:1px solid #e6e6e6;
z-index:1000;
}

.container{
max-width:1100px;
margin:auto;
padding:0 20px;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 10px;
}

.site-title{
font-size:34px;
font-weight:500;
letter-spacing:0.5px;
}

/* MENU */

.menu{
display:flex;
gap:28px;
}

.menu a{
text-decoration:none;
color:#333;
font-size:16px;
position:relative;
}

.menu a.active{
color:#888;
font-weight:600;
}

/* HOVER ÇİZGİ */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:#3f6f52;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* CONTENT */

.content{
margin-top:160px;
text-align:center;
}

.content h1{
font-size:36px;
margin-bottom:60px;
}

/* CATEGORY */

.category-container{
display:flex;
justify-content:center;
gap:80px;
flex-wrap:wrap;
}

.category{
max-width:320px;
}

.category a{
text-decoration:none;
color:inherit;
}

.category h2{
font-size:26px;
margin-bottom:12px;
}

.category p{
font-size:18px;
color:#555;
line-height:1.6;
}

.category:hover h2{
color:#3f6f52;
}

</style>

</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
<a href="/" style="text-decoration:none;color:inherit;">Nagihan Saka</a>
</div>

<div class="menu">
<a href="/dusunceler.html" class="active">Düşünceler</a>
<a href="/calismalar.html">Çalışmalar</a>
<a href="/iletisim.html">İletişim</a>
</div>

</div>
</div>
</div>


<div class="container content">

<h1>Düşünceler</h1>

<div class="category-container">

<div class="category">
<a href="/denemeler.html">
<h2>Denemeler</h2>
<p>Uzun düşünce yazıları.</p>
</a>
</div>

<div class="category">
<a href="/tweetler.html">
<h2>Tweetler</h2>
<p>Kısa notlar ve fikir parçaları.</p>
</a>
</div>

</div>

</div>

</body>
</html>
