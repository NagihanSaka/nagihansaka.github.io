<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:white;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:white;
    border-bottom:1px solid #ddd;
    z-index:1000;
}

.container{
    max-width:900px;
    margin:auto;
}

/* ÜST BAR */

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 10px;
}

.site-title{
    font-size:28px;
    font-weight:600;
}

/* MENU */

.menu{
    display:flex;
    gap:28px;
}

.menu a{
    text-decoration:none;
    color:#333;
    font-size:16px;
    position:relative;
}

/* PREMIUM HOVER ÇİZGİ EFEKTİ */

.menu a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:2px;
    background:#0a66c2;
    transition:0.3s;
}

.menu a:hover::after{
    width:100%;
}

/* HERO */

.hero{
    margin-top:100px;
}

.hero img{
    width:100%;
    border-radius:6px;
    box-shadow:0 25px 45px rgba(0,0,0,0.35);
}

/* MOBİL */

@media (max-width:700px){

.topbar{
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.site-title{
    margin-bottom:10px;
}

.menu{
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
}

.menu a{
    font-size:15px;
}

.hero{
    margin-top:120px;
}

}

</style>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
Nagihan Saka
</div>

<div class="menu">
<a href="/">Nagihan'ca</a>
<a href="/strateji">Strateji</a>
<a href="/sistem-dinamikleri">Sistem Dinamikleri</a>
<a href="/iletisim">İletişim</a>
</div>

</div>
</div>
</div>

<div class="container hero">

<img src="/assets/hero.png">

</div>
