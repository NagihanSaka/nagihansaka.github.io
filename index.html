<style>

body{
    margin:0;
    font-family: Georgia, "Book Antiqua", serif;
    background:#f6f5f2;
    color:#1f1f1f;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#fbfbfa;
    border-bottom:1px solid #e6e6e6;
    z-index:1000;
}

.container{
    max-width:900px;
    margin:auto;
}

/* ÜST BAR */

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 10px;
}

.site-title{
    font-size:34px;
    font-weight:500;
    letter-spacing:0.5px;
}

/* MENU */

.menu{
    display:flex;
    gap:28px;
}

.menu a{
    text-decoration:none;
    color:#333;
    font-size:16px;
    position:relative;
}

/* HOVER ÇİZGİ */

.menu a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:2px;
    background:#3f6f52;
    transition:0.3s;
}

.menu a:hover::after{
    width:100%;
}

/* ANA SAYFA GİRİŞ */

.intro{
    margin-top:180px;
    text-align:center;
    padding:20px;
}

.circle{
    width:140px;
    height:140px;
    border-radius:50%;
    background:#d9e2d4;
    margin:40px auto;
}

.intro-text{
    font-size:20px;
    line-height:1.6;
    max-width:650px;
    margin:auto;
}

/* MOBİL */

@media (max-width:700px){

.topbar{
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.site-title{
    margin-bottom:10px;
}

.menu{
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
}

.menu a{
    font-size:15px;
}

.intro{
    margin-top:200px;
}

.intro-text{
    font-size:18px;
}

}

</style>
</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">

</div>

<div class="menu">

</div>

</div>
</div>
</div>

<div class="container intro">

<div class="circle"></div>

<div class="intro-text">
