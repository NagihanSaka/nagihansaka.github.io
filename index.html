<style>

body{
margin:0;
font-family: Georgia, "Book Antiqua", serif;
background:#f6f5f2;
color:#1f1f1f;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fbfbfa;
border-bottom:1px solid #e6e6e6;
z-index:1000;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ÜST BAR */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 10px;
}

.site-title{
font-size:34px;
font-weight:500;
letter-spacing:0.5px;
}

/* MENU */

.menu{
display:flex;
gap:28px;
}

.menu a{
text-decoration:none;
color:#333;
font-size:16px;
position:relative;
}

/* ACTIVE MENU */

.menu a.active{
color:#888;
font-weight:600;
}

/* HOVER ÇİZGİ */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:#3f6f52;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* ANA SAYFA GÖRSEL ALANI */

.home-hero{
position:relative;
text-align:center;
margin-top:150px;
margin-bottom:120px;
}

.home-hero img{
width:80%;
display:block;
margin:auto;
}

.hero-text{
position:absolute;
top:10%;
left:50%;
transform:translateX(-50%);
width:70%;
text-align:center;
color:#4a4747;
}

.hero-text h1{
margin:0 0 18px 0;
font-size:36px;
font-style:italic;
font-weight:600;
line-height:1.2;
}

.hero-text p{
margin:0;
font-size:20px;
font-style:italic;
line-height:1.5;
}

.hero-divider{
margin-top:18px;
font-size:18px;
letter-spacing:10px;
color:#8b8b8b;
}

/* MOBİL */

@media (max-width:700px){

.topbar{
flex-direction:column;
align-items:center;
text-align:center;
}

.site-title{
margin-bottom:10px;
font-size:28px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.menu a{
font-size:15px;
}

.home-hero{
margin-top:135px;
margin-bottom:80px;
}

.home-hero img{
width:95%;
}

.hero-text{
top:13%;
width:82%;
}

.hero-text h1{
font-size:22px;
margin-bottom:10px;
}

.hero-text p{
font-size:14px;
}

.hero-divider{
margin-top:10px;
font-size:14px;
letter-spacing:5px;
}

}

</style>

</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
<a href="/" style="text-decoration:none;color:inherit;">Nagihan Saka</a>
</div>

<div class="menu">

<a href="/calismalar.html">Çalışmalar</a>
<a href="/iletisim.html">İletişim</a>
</div>

</div>
</div>
</div>

<div class="container home-hero">

<img src="/assets/anasayfa.png" alt="Nagihan ana sayfa">

<div class="hero-text">
<h1>Nagihan'ca yolculuklar</h1>
<p>İnsanlı, insanımsı ve insansız sistemler üzerine notlar</p>
<div class="hero-divider">◇ ◇ ◇</div>
</div>

</div>
