<style>

body{
margin:0;
font-family: Georgia, "Book Antiqua", serif;
background:#f6f5f2;
color:#1f1f1f;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fbfbfa;
border-bottom:1px solid #e6e6e6;
z-index:1000;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ÜST BAR */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 10px;
}

.site-title{
font-size:34px;
font-weight:500;
letter-spacing:0.5px;
}

/* MENU */

.menu{
display:flex;
gap:28px;
}

.menu a{
text-decoration:none;
color:#333;
font-size:16px;
position:relative;
}

/* HOVER ÇİZGİ */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:#3f6f52;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* ANA SAYFA GÖRSEL */

.home-image img{
width:100%;
display:block;
margin:auto;
border:2px solid #2b2b2b;
}

.home-image img{
width:110%;
display:block;
border:2px solid #2b2b2b;
margin-left:-5%;
}

/* MOBİL */

@media (max-width:700px){

.topbar{
flex-direction:column;
align-items:center;
text-align:center;
}

.site-title{
margin-bottom:10px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.menu a{
font-size:15px;
}

.home-image{
margin-top:160px;
padding:40px 0;
min-height:700px;
}

}

</style>

</head>

<body>

<div class="header">
<div class="container">

<div class="topbar">

<div class="site-title">
<a href="/" style="text-decoration:none;color:inherit;">Nagihan Saka</a>
</div>

<div class="menu">
<a href="/nagihanca">Nagihan'ca</a>
<a href="/strateji">Strateji</a>
<a href="/sistem-dinamikleri">Sistem Dinamikleri</a>
<a href="/iletisim">İletişim</a>
</div>

</div>
</div>
</div>

<div class="container home-image">

<img src="/assets/anasayfa.png" alt="Nagihan ana sayfa">

</div>
